name: AKHA Quality Gate

on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      baseline_report:
        description: Baseline report path in repository
        required: false
        default: tests/fixtures/golden_target_report.json
      current_report:
        description: Current report path (optional, fallback to output/scan_report_latest.json)
        required: false
        default: ""
      max_duration_regression:
        description: Max duration regression percentage
        required: false
        default: "20"
      max_request_regression:
        description: Max request regression percentage
        required: false
        default: "25"
      max_p95_latency_regression:
        description: Max p95 latency regression percentage
        required: false
        default: "30"
      min_confirmed_ratio:
        description: Minimum confirmed ratio percentage
        required: false
        default: "40"
      max_confirmed_ratio_drop:
        description: Max allowed confirmed ratio drop percentage
        required: false
        default: "20"

jobs:
  validate:
    name: AKHA / Preflight Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run quality-gate unit tests
        run: |
          python -m pytest -q tests/test_quality_gate_tool.py tests/test_cli_config_mapping.py

  build-current-report:
    name: AKHA / Build Current Report
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      resolved-current: ${{ steps.resolve-current.outputs.current_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve current report path
        id: resolve-current
        shell: bash
        run: |
          INPUT_PATH="${{ github.event.inputs.current_report }}"
          if [ -n "$INPUT_PATH" ] && [ -f "$INPUT_PATH" ]; then
            cp "$INPUT_PATH" current_report.json
          elif [ -f output/scan_report_latest.json ]; then
            cp output/scan_report_latest.json current_report.json
          else
            cp tests/fixtures/golden_target_report.json current_report.json
          fi
          echo "current_path=current_report.json" >> "$GITHUB_OUTPUT"

      - name: Upload current report artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-scan-report
          path: current_report.json

  quality-gate:
    name: AKHA / Quality Gate (Required)
    runs-on: ubuntu-latest
    needs: build-current-report
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download current report artifact
        uses: actions/download-artifact@v4
        with:
          name: current-scan-report
          path: artifacts

      - name: Resolve baseline path
        id: baseline
        shell: bash
        run: |
          BASELINE_INPUT="${{ github.event.inputs.baseline_report }}"
          if [ -n "$BASELINE_INPUT" ] && [ -f "$BASELINE_INPUT" ]; then
            echo "baseline_path=$BASELINE_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "baseline_path=tests/fixtures/golden_target_report.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Run quality gate
        run: |
          python tools/quality_gate.py \
            --baseline "${{ steps.baseline.outputs.baseline_path }}" \
            --current "artifacts/current_report.json" \
            --max-duration-regression "${{ github.event.inputs.max_duration_regression || '20' }}" \
            --max-request-regression "${{ github.event.inputs.max_request_regression || '25' }}" \
            --max-p95-latency-regression "${{ github.event.inputs.max_p95_latency_regression || '30' }}" \
            --min-confirmed-ratio "${{ github.event.inputs.min_confirmed_ratio || '40' }}" \
            --max-confirmed-ratio-drop "${{ github.event.inputs.max_confirmed_ratio_drop || '20' }}"
